<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self';" />
  <title>Frndship — Offline</title>
  <link rel="stylesheet" href="offline.css" />
</head>
<body>
  <main class="offline-card">
    <div class="logo">Frndship</div>
    <h1>You're offline</h1>
    <p>We'll reconnect automatically as soon as your connection is back.</p>
    <button id="retry-btn" type="button">Retry</button>
    <p class="status" id="status"></p>
  </main>

  <script src="offline.js"></script>
</body>
</html>
